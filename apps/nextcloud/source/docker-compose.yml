# 1. docker-compose.yml — Nextcloud 4 services (app + db + redis + nginx) + HTTPS profile
# Nextcloud:30.0-apache (PHP 8.4 + Apache), PostgreSQL 16.9, Redis 7.4-alpine, Nginx 1.27-alpine
# HTTP: nginx on :80 → nextcloud:80
# HTTPS: nginx on :443 → nextcloud:80 (with TLS certs from ./certs/)
# Data: bind mount /var/lib/nextcloud/{app,db,redis}

services:
  db:
    image: postgres:16.9
    volumes:
      - /var/lib/nextcloud/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - /var/lib/nextcloud/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  nextcloud:
    image: nextcloud:30.0-apache
    volumes:
      - /var/lib/nextcloud/app:/var/www/html
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 512M
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - /var/lib/nextcloud/app:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/status.php"]
      interval: 60s
      timeout: 15s
      retries: 3
    depends_on:
      nextcloud:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    profiles:
      - http
      - default

  nginx-https:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/lib/nextcloud/app:/var/www/html:ro
      - ./nginx/default-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/status.php"]
      interval: 60s
      timeout: 15s
      retries: 3
    depends_on:
      nextcloud:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    profiles:
      - https

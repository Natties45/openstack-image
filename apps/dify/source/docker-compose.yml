services:
  # ── Core Application ──────────────────────────────────────
  api:
    image: langgenius/dify-api:1.14.2
    container_name: dify-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: api
    volumes:
      - ./storage:/app/api/storage
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dify-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://api:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  worker:
    image: langgenius/dify-api:1.14.2
    container_name: dify-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: worker
    volumes:
      - ./storage:/app/api/storage
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dify-net

  worker_beat:
    image: langgenius/dify-api:1.14.2
    container_name: dify-worker-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: beat
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dify-net

  web:
    image: langgenius/dify-web:1.14.2
    container_name: dify-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EDITION: SELF_HOSTED
      NEXT_PUBLIC_DEPLOY_ENV: PRODUCTION
    networks:
      - dify-net

  # ── Collaboration WebSocket ───────────────────────────────
  api_websocket:
    image: langgenius/dify-api:1.14.2
    container_name: dify-api-websocket
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: api_websocket
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dify-net

  # ── Database ──────────────────────────────────────────────
  db_postgres:
    image: postgres:15-alpine
    container_name: dify-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      POSTGRES_USER: ${DB_USER:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dify-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-dify}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Cache / Broker ────────────────────────────────────────
  redis:
    image: redis:6-alpine
    container_name: dify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dify-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: dify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - api_websocket
    networks:
      - dify-net

  # ── Code Sandbox ──────────────────────────────────────────
  sandbox:
    image: langgenius/dify-sandbox:0.2.15
    container_name: dify-sandbox
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_KEY: ${SANDBOX_API_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
    volumes:
      - sandbox_deps:/dependencies
    networks:
      - ssrf-net

  # ── SSRF Protection ───────────────────────────────────────
  ssrf_proxy:
    image: ubuntu/squid:latest
    container_name: dify-ssrf-proxy
    restart: unless-stopped
    volumes:
      - ssrf_proxy_cache:/var/spool/squid
    networks:
      - dify-net
      - ssrf-net

  # ── Vector Database ───────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: dify-weaviate
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - dify-net

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    name: dify_postgres_data
  redis_data:
    name: dify_redis_data
  weaviate_data:
    name: dify_weaviate_data
  sandbox_deps:
    name: dify_sandbox_deps
  ssrf_proxy_cache:
    name: dify_ssrf_proxy_cache

# ── Networks ────────────────────────────────────────────────
networks:
  dify-net:
    name: dify_net
  ssrf-net:
    name: dify_ssrf_net
    internal: true

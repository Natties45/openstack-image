# n8n HTTP mode — nginx serves on port 80, proxies to n8n:5678
# Used when no SSL certs are present (default mode)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets support for n8n webhooks
    location ~ ^/(webhook|webhook-test) {
        proxy_pass http://n8n:5678;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket support for n8n UI push channel (/rest/push)
    # n8n uses Server-Sent Events / WebSocket at /rest/push for real-time
    # workflow execution status updates — without Upgrade headers the
    # browser UI loses connection when executing manual-trigger workflows.
    location ~ ^/rest/push {
        proxy_pass http://n8n:5678;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}
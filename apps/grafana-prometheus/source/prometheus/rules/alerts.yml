groups:
  - name: self_service_monitoring
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Target down: {{ $labels.instance }}"
          description: "Prometheus cannot scrape {{ $labels.job }} target {{ $labels.instance }}."

      - alert: HostDiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low: {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} has less than 15% free space."

      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU: {{ $labels.instance }}"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory: {{ $labels.instance }}"
          description: "Memory usage has been above 90% for 10 minutes."

      - alert: HTTPProbeFailed
        expr: probe_success{job="blackbox_http"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HTTP probe failed: {{ $labels.instance }}"
          description: "HTTP probe has failed for {{ $labels.instance }}."

      - alert: TCPProbeFailed
        expr: probe_success{job="blackbox_tcp"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "TCP probe failed: {{ $labels.instance }}"
          description: "TCP probe has failed for {{ $labels.instance }}."

      - alert: SSLCertificateExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox_http"} - time()) / 86400 < 14
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring soon: {{ $labels.instance }}"
          description: "TLS certificate for {{ $labels.instance }} expires in less than 14 days."

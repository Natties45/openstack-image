global:
  resolve_timeout: 5m

route:
  receiver: local-placeholder
  group_by:
    - alertname
    - job
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: local-placeholder

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance
